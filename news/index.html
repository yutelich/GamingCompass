  .nl-ttl{font-size:0.88rem;color:var(--c-text-2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .nl-item:hover .nl-ttl{color:var(--c-text)}
  .nl-dt{font-size:0.72rem;color:var(--c-text-3);white-space:nowrap;flex-shrink:0;margin-top:0.15rem}

  @keyframes bl{0%,100%{opacity:1}50%{opacity:0.3}}

  #hero-wrap a{display:grid;grid-template-columns:1fr 1fr}

<script>
var CF = 'https://gc-rss-proxy.yudithputra-smi.workers.dev/?url=';
var RSS_URL = 'https://gamebrott.com/category/berita/feed';
var FALLBACK_IMG = 'https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=1200&auto=format&fit=crop';
var FALLBACK_CREDIT = 'Photo: Javier Martinez / Unsplash';

var NON_GAME_KW = ['smartphone','earphone','earbuds','tws ','kamera mirrorless','dslr','oppo find','samsung galaxy a','xiaomi redmi','vivo v','realme c','iphone 16','macbook','powerbank','kulkas','ac ruangan','printer','router wifi','tv oled'];
var GAME_KW = ['game','gaming','gamer','esport','ps5','ps4','ps3','xbox','nintendo','switch','steam','playstation','valorant','mobile legend','mlbb','pubg','free fire','genshin','rpg','fps','moba','mmorpg','indie','dlc','patch','konsol','pc game'];

function isGaming(title, excerpt) {
  var t = (title + ' ' + excerpt).toLowerCase();
  if (NON_GAME_KW.some(function(k){ return t.indexOf(k) !== -1; })) return false;
  if (GAME_KW.some(function(k){ return t.indexOf(k) !== -1; })) return true;
  return true;
}

function stripHtml(s) {
  var d = document.createElement('div');
  d.innerHTML = s;
  return (d.textContent || d.innerText || '').replace(/\s+/g,' ').trim();
}

function fmtDate(s) {
  if (!s) return '';
  try {
    var d = new Date(s), now = new Date(), diff = Math.floor((now-d)/1000);
    if (isNaN(diff)) return s;
    if (diff < 3600) return Math.floor(diff/60) + ' menit lalu';
    if (diff < 86400) return Math.floor(diff/3600) + ' jam lalu';
    if (diff < 604800) return Math.floor(diff/86400) + ' hari lalu';
    return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
  } catch(e) { return s; }
}

function extractImg(item, dHtml, cHtml) {
  var enc = item.querySelector('enclosure[type^="image"]');
  if (enc) return enc.getAttribute('url');
  var mc = item.querySelector('content');
  if (mc && mc.getAttribute('url')) return mc.getAttribute('url');
  var sources = [dHtml, cHtml];
  for (var i = 0; i < sources.length; i++) {
    if (!sources[i]) continue;
    var m = sources[i].match(/<img[^>]+src=["']([^"']+)["']/i);
    if (m && m[1] && m[1].indexOf('http') === 0 && !/pixel|track|1x1|beacon/i.test(m[1])) return m[1];
  }
  return null;
}

function safeImg(src, cls) {
  // Gunakan data-src untuk avoid quote conflict di onerror
  var el = document.createElement('img');
  el.src = src;
  el.alt = '';
  el.loading = 'lazy';
  el.className = cls || '';
  el.addEventListener('error', function() { this.src = FALLBACK_IMG; });
  return el.outerHTML;
}

function parseRSS(xmlText) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(xmlText, 'application/xml');
  if (doc.querySelector('parsererror')) {
    doc = parser.parseFromString(xmlText, 'text/xml');
    if (doc.querySelector('parsererror')) throw new Error('XML parse error');
  }
  var items = Array.from(doc.querySelectorAll('item')).slice(0, 20);
  if (!items.length) throw new Error('No items');
  return items.map(function(item) {
    var title = item.querySelector('title') ? item.querySelector('title').textContent.trim() : '';
    var linkEl = item.querySelector('link');
    var link = linkEl ? (linkEl.textContent.trim() || linkEl.getAttribute('href') || '') : '';
    if (!link) { var g = item.querySelector('guid'); if (g) link = g.textContent.trim(); }
    var date = item.querySelector('pubDate') ? item.querySelector('pubDate').textContent.trim() : '';
    var dEl = item.querySelector('description'), dHtml = dEl ? dEl.textContent : '';
    var cEl = item.querySelector('encoded') || item.querySelector('content'), cHtml = cEl ? cEl.textContent : '';
    var excerpt = stripHtml(dHtml || cHtml).slice(0, 200);
    return { title: title, link: link || '#', date: date, excerpt: excerpt, image: extractImg(item, dHtml, cHtml) };
  }).filter(function(a) { return isGaming(a.title, a.excerpt); });
}

function renderHero(a) {
  var w = document.getElementById('hero-wrap');
  if (!a) { w.innerHTML = ''; return; }

  var heroImg = a.image || FALLBACK_IMG;
  var isDefault = !a.image;

  // Build menggunakan DOM untuk hindari masalah quote
  var link = document.createElement('a');
  link.href = a.link;
  link.target = '_blank';
  link.rel = 'noopener';
  link.className = 'news-hero';

  var nhi = document.createElement('div');
  nhi.className = 'nhi';

  var img = document.createElement('img');
  img.src = heroImg;
  img.alt = '';
  img.loading = 'lazy';
  img.addEventListener('error', function() { this.src = FALLBACK_IMG; });
  nhi.appendChild(img);

  if (isDefault) {
    var credit = document.createElement('span');
    credit.className = 'nhi-credit';
    credit.textContent = FALLBACK_CREDIT;
    nhi.appendChild(credit);
  }

  var nhb = document.createElement('div');
  nhb.className = 'nhb';
  nhb.innerHTML =
    '<div class="nhs"><span style="width:8px;height:8px;border-radius:50%;background:#e74c3c;display:inline-block"></span>Gamebrott</div>' +
    '<div class="nht">' + a.title + '</div>' +
    (a.excerpt ? '<div class="nhe">' + a.excerpt + '...</div>' : '') +
    '<div class="nhd">' + fmtDate(a.date) + '</div>';

  link.appendChild(nhi);
  link.appendChild(nhb);
  w.innerHTML = '';
  w.appendChild(link);
}

function renderGrid(arts) {
  var g = document.getElementById('news-grid');
  var l = document.getElementById('list-wrap');

  if (!arts.length) {
    g.innerHTML = '';
    l.innerHTML = '<div class="nempty"><div style="font-size:2rem;margin-bottom:0.75rem">&#128205;</div><div>Tidak ada berita saat ini.</div><button class="nrbtn" onclick="loadNews()">&#x21BA; Coba Lagi</button></div>';
    return;
  }

  var withImg = arts.filter(function(a) { return !!a.image; });
  var noImg = arts.filter(function(a) { return !a.image; });

  // Gallery grid — artikel bergambar
  g.innerHTML = withImg.map(function(a) {
    return '<a href="' + a.link + '" target="_blank" rel="noopener" class="nc">' +
      '<div class="nci"><img src="' + a.image + '" alt="" loading="lazy"></div>' +
      '<div class="ncb">' +
        '<div class="ncsrc">Gamebrott</div>' +
        '<div class="nctl">' + a.title + '</div>' +
        '<div class="ncdt">' + fmtDate(a.date) + '</div>' +
      '</div>' +
    '</a>';
  }).join('');

  // List teks — artikel tanpa gambar
  if (noImg.length) {
    l.innerHTML = '<div class="nl-section"><div class="nl-title">Berita Lainnya</div>' +
      noImg.map(function(a) {
        return '<a href="' + a.link + '" target="_blank" rel="noopener" class="nl-item">' +
          '<div>' +
            '<div class="nl-src">Gamebrott</div>' +
            '<div class="nl-ttl">' + a.title + '</div>' +
          '</div>' +
          '<div class="nl-dt">' + fmtDate(a.date) + '</div>' +
        '</a>';
      }).join('') +
    '</div>';
  } else {
    l.innerHTML = '';
  }
}

function renderSkeleton() {
  document.getElementById('hero-wrap').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem">' +
      '<div class="skel" style="aspect-ratio:16/9"></div>' +
      '<div style="padding:2rem;display:flex;flex-direction:column;gap:0.75rem">' +
        '<div class="skel" style="height:12px;width:40%"></div>' +
        '<div class="skel" style="height:20px"></div>' +
        '<div class="skel" style="height:20px;width:85%"></div>' +
        '<div class="skel" style="height:14px;width:60%"></div>' +
      '</div>' +
    '</div>';
  var g = document.getElementById('news-grid'), html = '';
  for (var i = 0; i < 6; i++) {
    html += '<div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);overflow:hidden">' +
      '<div class="skel" style="aspect-ratio:4/3"></div>' +
      '<div style="padding:0.75rem 1rem;display:flex;flex-direction:column;gap:0.5rem">' +
        '<div class="skel" style="height:11px;width:35%"></div>' +
        '<div class="skel" style="height:14px"></div>' +
        '<div class="skel" style="height:14px;width:80%"></div>' +
      '</div>' +
    '</div>';
  }
  g.innerHTML = html;
  document.getElementById('list-wrap').innerHTML = '';
}

async function loadNews() {
  renderSkeleton();
  try {
    var ctrl = new AbortController();
    var t = setTimeout(function() { ctrl.abort(); }, 15000);
    var res = await fetch(CF + encodeURIComponent(RSS_URL), { signal: ctrl.signal });
    clearTimeout(t);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var xml = await res.text();
    var arts = parseRSS(xml);

    var updEl = document.getElementById('nupd');
    var updTxt = document.getElementById('nupd-txt');
    updEl.style.display = 'flex';

    if (!arts.length) {
      updTxt.textContent = 'Tidak ada artikel';
      document.getElementById('hero-wrap').innerHTML = '';
      document.getElementById('news-grid').innerHTML = '';
      document.getElementById('list-wrap').innerHTML =
        '<div class="nempty"><div style="font-size:2rem">&#9888;&#65039;</div><div>Gagal memuat berita.</div>' +
        '<button class="nrbtn" onclick="loadNews()">&#x21BA; Coba Lagi</button></div>';
      return;
    }

    var now = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    updTxt.textContent = arts.length + ' artikel game \u00b7 ' + now;
    console.log('Loaded: ' + arts.length + ' artikel setelah filter');

    // Hero: artikel bergambar pertama, fallback ke terbaru
    var withImg = arts.filter(function(a) { return !!a.image; });
    var hero = withImg[0] || arts[0];
    var rest = arts.filter(function(a) { return a !== hero; });

    renderHero(hero);
    renderGrid(rest);

  } catch(e) {
    console.error('loadNews error:', e.message);
    document.getElementById('nupd').style.display = 'flex';
    document.getElementById('nupd-txt').textContent = 'Gagal memuat';
    document.getElementById('hero-wrap').innerHTML = '';
    document.getElementById('news-grid').innerHTML = '';
    document.getElementById('list-wrap').innerHTML =
      '<div class="nempty"><div style="font-size:2rem">&#9888;&#65039;</div>' +
      '<div>Gagal memuat berita. Periksa koneksi.</div>' +
      '<button class="nrbtn" onclick="loadNews()">&#x21BA; Coba Lagi</button></div>';
  }
}

loadNews();
setInterval(loadNews, 10 * 60 * 1000);
</script>
